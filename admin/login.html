<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin Sign In | PTG Activewear</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="login-page">
  <main class="login-panel">
    <img src="/photos/ptg-logo-dark-transparent.webp" alt="PTG Activewear" class="login-logo">
    <h1>Admin sign in</h1>
    <p>Use an approved email address. We will send you a secure six-digit code.</p>
    <form id="login-form">
      <label class="field"><span>Email</span><input id="email" name="email" type="email" autocomplete="email" required></label>
      <label class="field" id="code-field" hidden><span>Sign-in code</span><input id="code" name="code" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6"></label>
      <p id="login-status" class="status is-hidden" role="status"></p>
      <button class="button button-primary" id="login-submit" type="submit">Send sign-in code</button>
    </form>
  </main>
  <script src="/admin/login.js" defer></script>
</body>
</html>
