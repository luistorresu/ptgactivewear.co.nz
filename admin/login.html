<!doctype html>
<html lang="en-NZ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin Login | PTG Activewear</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="login-page">
  <main class="login-card">
    <img class="login-logo" src="/photos/ptg-logo-dark-transparent.webp" alt="PTG Activewear" width="230" height="80">
    <p class="eyebrow">Secure administration</p>
    <h1>Admin login</h1>
    <p>Enter your PTG Activewear admin credentials.</p>
    <div class="notice" role="alert" aria-live="polite" data-login-notice hidden></div>
    <form class="login-form" data-login-form novalidate>
      <label>
        <span>Username</span>
        <input name="username" autocomplete="username" maxlength="160" required autofocus>
      </label>
      <label>
        <span>Password</span>
        <input name="password" type="password" autocomplete="current-password" maxlength="1024" required>
      </label>
      <button class="button button-primary button-large" type="submit" data-login-button>Log In</button>
    </form>
  </main>
  <script src="/admin/login.js" defer></script>
</body>
</html>
